<!--login.html-->
{% extends "base.html" %}

{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VoiceOps AI - Login</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="login-body">
<div class="login-container">
    
    <div class="login-logo">
        <span class="logo-icon-large">🎙️</span>
        <h1 class="login-title">Voice<span class="highlight">Ops</span> AI</h1>
        <p class="login-subtitle">Intelligent Infrastructure Monitoring</p>
    </div>

    <div class="login-box">
        <h2>Sign In</h2>
        
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter username" />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter password" />
            </div>

            <button type="submit" class="login-submit-btn">
                <span>Login</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                </svg>
            </button>
        </form>

        <div class="login-footer">
            <p>Secure Access to Infrastructure Metrics</p>
        </div>
    </div>

</div>
</body>
</html>
{% endblock %}
