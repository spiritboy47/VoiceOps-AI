<!--dashboard.html-->
{% extends "base.html" %}

{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VoiceOps AI Dashboard</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="dashboard-body">

    <!-- Welcome Animation Screen -->
    <div id="welcomeScreen" class="welcome-screen">
        <div class="welcome-content">
            <div class="welcome-logo">
                <span class="logo-icon-welcome">🎙️</span>
                <h1 class="welcome-title">Voice<span class="highlight">Ops</span> AI</h1>
            </div>
            <p class="welcome-text">Welcome to VoiceOps</p>
            <p class="welcome-subtext">Press any key to continue</p>
            <div class="pulse-ring"></div>
        </div>
    </div>

    <!-- Main Dashboard Content (Hidden Initially) -->
    <div id="dashboardContent" class="dashboard-content-hidden">
        <div class="dashboard-container">

            <div class="dashboard-header">
                <h1>🚀 VoiceOps AI Dashboard</h1>
                <p class="dashboard-subtitle">Intelligent Infrastructure Monitoring & Voice Control</p>
                <div class="alert-toggle">
                  <label class="switch">
                      <input type="checkbox" id="alertToggle" checked>
                      <span class="slider"></span>
                  </label>
                  <span class="alert-label">Alerts ON</span>
              </div>
            </div>

            <div class="metrics-row">
                <div class="metric-box">
                    <div class="metric-label">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="#3ab0ff" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                        </svg>
                        CPU
                    </div>
                    <div class="metric-value" id="cpuValue">--</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="#3ab0ff" xmlns="http://www.w3.org/2000/svg">
                            <path d="M2 20h20v-4H2v4zm2-3h2v2H4v-2zM2 4v4h20V4H2zm4 3H4V5h2v2zm-4 7h20v-4H2v4zm2-3h2v2H4v-2z"/>
                        </svg>
                        Memory
                    </div>
                    <div class="metric-value" id="memoryValue">--</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="#3ab0ff" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/>
                        </svg>
                        Disk
                    </div>
                    <div class="metric-value" id="diskValue">--</div>
                </div>
                <div class="metric-box env-box">
                    <div class="metric-label">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="#3ab0ff" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                        </svg>
                        ENV:
                    </div>
                    <div class="metric-value" id="envValue">None</div>
                </div>
            </div>

            <div class="chat-mic-row">

                <div class="chat-section">
                    <div id="chatContainer" class="chat-container"></div>

                    <div class="buttons-row">
                        <button id="btnDevCpu">DEV CPU</button>
                        <button id="btnQaCpu">QA CPU</button>
                        <button id="btnProdMemory">PROD MEMORY</button>
                        <button id="clearBtn">Clear Screen</button>
                    </div>

                    <div class="input-row">
                        <input type="text" id="chatInput" placeholder="Ask something..." autocomplete="off" />
                        <button id="sendBtn">Send</button>
                    </div>
                </div>

                <div class="mic-section">
                    <div id="micIcon" class="mic red" title="Click to speak">
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                            <path d="M19 11v2c0 3.31-2.69 6-6 6s-6-2.69-6-6v-2H5v2c0 4.08 3.05 7.44 7 7.93V23h2v-2.07c3.95-.49 7-3.85 7-7.93v-2h-2z"/>
                        </svg>
                    </div>
                    <div id="listeningStatus" class="listening red-text">Not Listening</div>
                </div>

            </div>
            
        </div>
    </div>

<script src="/static/voice.js"></script>
</body>
</html>
{% endblock %}
